<!-- Modal alternativo para crear medicamento (CSS vanilla) -->
<div id="modal-medicamento-simple" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
">
    <div style="
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 800px;
        max-height: 90vh;
        overflow-y: auto;
        margin: 20px;
    ">
        <!-- Header -->
        <div style="
            padding: 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        ">
            <h2 style="
                margin: 0;
                font-size: 24px;
                font-weight: bold;
                color: #1f2937;
            ">Crear Nuevo Medicamento</h2>
            <button id="close-modal-medicamento-simple" onclick="cerrarModalMedicamentoSimple()" style="
                background: none;
                border: none;
                font-size: 24px;
                cursor: pointer;
                color: #6b7280;
                padding: 8px;
                border-radius: 6px;
            " onmouseover="this.style.backgroundColor='#f3f4f6'" 
               onmouseout="this.style.backgroundColor='transparent'">×</button>
        </div>

        <!-- Body -->
        <div style="padding: 24px;">
            <form id="form-medicamento-simple">
                {% csrf_token %}
                
                <!-- Grid de campos -->
                <div style="
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                    gap: 16px;
                    margin-bottom: 24px;
                ">
                    <!-- Nombre -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Nombre del Medicamento <span style="color: #ef4444;">*</span></label>
                        <input type="text" name="nombre" id="medicamento-nombre-simple" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        " placeholder="Ej: Ibuprofeno">
                    </div>
                    
                    <!-- Concentración -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Concentración</label>
                        <input type="text" name="concentracion" id="medicamento-concentracion-simple" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        " placeholder="Ej: 500mg, 1g">
                    </div>
                    
                    <!-- Tipo -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Tipo de Medicamento <span style="color: #ef4444;">*</span></label>
                        <select name="tipo" id="medicamento-tipo-simple" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        ">
                            <option value="">Seleccione un tipo...</option>
                            {% for tipo in tipos_medicamento %}
                                <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Marca -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Marca</label>
                        <select name="marca" id="medicamento-marca-simple" style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        ">
                            <option value="">Sin marca específica</option>
                            {% for marca in marcas_medicamento %}
                                <option value="{{ marca.id }}">{{ marca.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Vía de administración -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Vía de Administración <span style="color: #ef4444;">*</span></label>
                        <select name="via_administracion" id="medicamento-via-simple" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        ">
                            <option value="">Seleccione vía...</option>
                            {% for via in vias_administracion %}
                                <option value="{{ via.0 }}">{{ via.1 }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- Stock -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Stock Disponible <span style="color: #ef4444;">*</span></label>
                        <input type="number" name="cantidad" id="medicamento-cantidad-simple" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        " placeholder="0" min="0">
                    </div>
                    
                    <!-- Precio -->
                    <div>
                        <label style="
                            display: block;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            margin-bottom: 8px;
                        ">Precio Unitario <span style="color: #ef4444;">*</span></label>
                        <input type="number" name="precio" id="medicamento-precio-simple" required style="
                            width: 100%;
                            padding: 12px;
                            border: 1px solid #d1d5db;
                            border-radius: 8px;
                            font-size: 14px;
                            box-sizing: border-box;
                        " placeholder="0.00" step="0.01" min="0">
                    </div>
                    
                    <!-- Comercial -->
                    <div style="grid-column: span 2;">
                        <label style="
                            display: flex;
                            align-items: center;
                            font-size: 14px;
                            font-weight: 500;
                            color: #374151;
                            cursor: pointer;
                        ">
                            <input type="checkbox" name="comercial" id="medicamento-comercial-simple" checked style="
                                margin-right: 8px;
                                width: 16px;
                                height: 16px;
                            ">
                            Es medicamento comercial
                        </label>
                    </div>
                </div>
                
                <!-- Descripción -->
                <div style="margin-bottom: 24px;">
                    <label style="
                        display: block;
                        font-size: 14px;
                        font-weight: 500;
                        color: #374151;
                        margin-bottom: 8px;
                    ">Descripción</label>
                    <textarea name="descripcion" id="medicamento-descripcion-simple" rows="3" style="
                        width: 100%;
                        padding: 12px;
                        border: 1px solid #d1d5db;
                        border-radius: 8px;
                        font-size: 14px;
                        box-sizing: border-box;
                        resize: vertical;
                    " placeholder="Descripción, indicaciones, precauciones..."></textarea>
                </div>
                
                <!-- Botones -->
                <div style="
                    display: flex;
                    justify-content: flex-end;
                    gap: 12px;
                    border-top: 1px solid #e5e7eb;
                    padding-top: 24px;
                ">
                    <button type="button" id="cancel-medicamento-simple" onclick="cerrarModalMedicamentoSimple()" style="
                        padding: 12px 24px;
                        background-color: #6b7280;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        font-size: 14px;
                        cursor: pointer;
                    " onmouseover="this.style.backgroundColor='#4b5563'" 
                       onmouseout="this.style.backgroundColor='#6b7280'">
                        Cancelar
                    </button>
                    <button type="submit" id="submit-medicamento-simple" style="
                        padding: 12px 24px;
                        background-color: #059669;
                        color: white;
                        border: none;
                        border-radius: 8px;
                        font-size: 14px;
                        cursor: pointer;
                    " onmouseover="this.style.backgroundColor='#047857'" 
                       onmouseout="this.style.backgroundColor='#059669'">
                        Crear Medicamento
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
